name: Mentors Automation

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches:
      - web

jobs:
  issue-automation:
    runs-on: ubuntu-latest
    if: github.event_name == 'issues'
    permissions:
      issues: write
    steps:
      - name: Add labels for Mentors
        uses: actions/github-script@v9
        with:
          script: |
            // ADD ALL MENTOR GITHUB USERNAMES HERE
            const MENTORS = ['Gooichand', 'nitinog10']; 
            
            const creator = context.payload.issue.user.login;
            
            if (MENTORS.includes(creator)) {
              await github.rest.issues.addLabels({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: ['gssoc26', `mentor:${creator}`]
              });
            }

  pr-automation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target'
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Assign Mentor to PR
        uses: actions/github-script@v9
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const issueRegex = /(?:fix|fixes|fixed|resolve|resolves|resolved|close|closes|closed)\s+#(\d+)/ig;
            let match;
            let mentorsToAssign = new Set();
            
            while ((match = issueRegex.exec(prBody)) !== null) {
              const issueNumber = parseInt(match[1], 10);
              try {
                const { data: issue } = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                
                // Extract dynamic mentor usernames from 'mentor:<username>' labels
                issue.labels.forEach(label => {
                  const labelName = typeof label === 'string' ? label : label.name;
                  if (labelName.startsWith('mentor:')) {
                    const mentorName = labelName.split('mentor:')[1].trim();
                    if (mentorName) {
                      mentorsToAssign.add(mentorName);
                    }
                  }
                });
              } catch (err) {
                console.log(`Could not fetch issue #${issueNumber}`);
              }
            }
            
            if (mentorsToAssign.size > 0) {
              const mentorsArray = Array.from(mentorsToAssign);
              
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                assignees: mentorsArray
              });
              
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                reviewers: mentorsArray
              });
              
              const mentorLabels = mentorsArray.map(m => `mentor:${m}`);
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: mentorLabels
              });
              
              const mentorsMentions = mentorsArray.map(m => `@${m}`).join(', ');
              
              const commentBody = `Hello @${context.payload.pull_request.user.login} 👋! Thanks for your contribution to the Web Branch for GSSoC.\n\nYour mentor(s) **${mentorsMentions}** have been automatically assigned to review your PR. While you wait, please go through these **initial review points** to speed up the process:\n\n- [ ] **Clean Code & Linting**: Have you run \`yarn lint\` and resolved all errors?\n- [ ] **Type Safety**: Have you run \`yarn typecheck\` to ensure there are no TypeScript errors and avoided \`any\` types where possible?\n- [ ] **Design Alignment**: Does your implementation follow the UltimateHealth design system without hardcoding pure black/white hex values?\n- [ ] **Testing**: Have you tested your changes thoroughly on desktop and mobile web browsers to ensure responsiveness?\n\n${mentorsMentions} will get back to you with a detailed review soon!`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: commentBody
              });
            }
