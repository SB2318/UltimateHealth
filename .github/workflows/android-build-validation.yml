name: Android Build Validation

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'frontend/android/**'
      - 'frontend/package.json'
      - 'frontend/yarn.lock'
      - '.github/workflows/android-build-validation.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/android/**'
      - 'frontend/package.json'
      - 'frontend/yarn.lock'
      - '.github/workflows/android-build-validation.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    name: Build Android Debug
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: ./frontend
    env:
      CI: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node & Cache Dependencies
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Cache Gradle Wrapper
        uses: actions/cache@v4
        with:
          path: ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('frontend/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-caches-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-caches-

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install JS Dependencies
        run: yarn install --frozen-lockfile

      - name: Grant Gradle Execute Permission
        working-directory: ./frontend/android
        run: chmod +x gradlew
        
      - name: Check Google Services Secret
        id: secret-check
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "has_secret=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Android build: GOOGLE_SERVICES_JSON secret is missing (fork PR)."
          else
            echo "has_secret=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Inject google-services.json
        if: steps.secret-check.outputs.has_secret == 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          node -e "
            const fs = require('fs');
            const path = 'android/app/google-services.json';
            let content = process.env.GOOGLE_SERVICES_JSON;
            let parsed;
            try {
              parsed = JSON.parse(content);
            } catch (e1) {
              try {
                const decoded = Buffer.from(content, 'base64').toString('utf8');
                parsed = JSON.parse(decoded);
              } catch (e2) {
                console.error('CRITICAL ERROR: GOOGLE_SERVICES_JSON secret is corrupted.');
                console.error('It is neither valid raw JSON nor valid Base64-encoded JSON.');
                console.error('Raw JSON Error:', e1.message);
                console.error('Base64 JSON Error:', e2.message);
                console.error('Please re-copy your google-services.json file and update your GitHub Secret!');
                process.exit(1);
              }
            }
            fs.writeFileSync(path, JSON.stringify(parsed, null, 2));
          "

      - name: Compile Android Debug Build
        if: steps.secret-check.outputs.has_secret == 'true'
        working-directory: ./frontend/android
        run: ./gradlew assembleDebug --console=plain --stacktrace 2>&1 | tee /tmp/gradle-output.log

      - name: Upload APK Artifact (On Failure)
        if: failure() && steps.secret-check.outputs.has_secret == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-build-logs
          path: |
            ~/.gradle/daemon/**/daemon-*.out.log
            frontend/android/app/build/reports
            /tmp/gradle-output.log
          if-no-files-found: ignore
          retention-days: 7
