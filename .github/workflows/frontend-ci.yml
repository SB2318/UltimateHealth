name: Frontend CI (Expo)

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cache disabled to make it fully package manager independent
          cache: 'none'

      - name: Detect Package Manager & Install Dependencies
        working-directory: ./frontend
        run: |
          echo "🔍 Detecting package manager in frontend folder..."
          
          if [ -f "bun.lockb" ]; then
            echo "Using Bun"
            curl -fsSL https://bun.sh/install | bash
            bun install
          elif [ -f "pnpm-lock.yaml" ]; then
            echo "Using pnpm"
            npm install -g pnpm
            pnpm install --frozen-lockfile
          elif [ -f "yarn.lock" ]; then
            echo "Using Yarn"
            npm install -g yarn
            yarn install --frozen-lockfile
          else
            echo "Using npm (default)"
            npm ci --legacy-peer-deps
          fi

      - name: Lint Check
        working-directory: ./frontend
        run: |
          if npm run lint --if-present > /dev/null 2>&1; then
            echo "Running lint with npm"
            npm run lint
          elif yarn lint --if-present > /dev/null 2>&1; then
            echo "Running lint with yarn"
            yarn lint
          elif pnpm lint --if-present > /dev/null 2>&1; then
            echo "Running lint with pnpm"
            pnpm lint
          else
            echo "No lint script found, skipping..."
          fi

      - name: TypeScript Check
        working-directory: ./frontend
        run: |
          if command -v tsc > /dev/null; then
            echo "Running TypeScript check"
            npx tsc --noEmit || echo "Type check completed with warnings"
          else
            echo "TypeScript check skipped (tsc not available)"
          fi
