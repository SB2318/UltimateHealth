# ──────────────────────────────────────────────────────────────────────────────
# 🤖 Gemini AI PR Reviewer (Manual / On-Demand)
# ──────────────────────────────────────────────────────────────────────────────
#
# DESCRIPTION:
#   Allows authorized maintainers to trigger a Gemini AI-powered code review
#   on any pull request by typing "/review" in a PR comment. The AI reads the
#   diff and posts a detailed review directly on the PR.
#
# HOW IT WORKS:
#   1. Listens for any new comment created on any issue or PR.
#   2. Runs only if ALL three conditions are true:
#        a. The comment is on a Pull Request (not a plain issue).
#        b. The comment body contains the "/review" command.
#        c. The commenter is an authorized user (SB2318 or rushiii3).
#   3. Checks out the repo and runs ai_reviewer.py with Gemini API keys.
#   4. The script fetches the PR diff and posts an AI review as a PR comment.
#
# TRIGGERS:
#   - Manual : An authorized user comments "/review" on any open PR.
#
# AUTHORIZED USERS:
#   - SB2318, rushiii3  (defined in the workflow's if: condition)
#
# PERMISSIONS REQUIRED:
#   - contents: read        → to read the code diff
#   - pull-requests: write  → to post the review comment on the PR
#
# SECRETS REQUIRED:
#   - GEMINI_KEY_1 ... GEMINI_KEY_5  → Gemini API keys (rotated for rate limits)
#   - GITHUB_TOKEN                   → provided automatically by GitHub
# ──────────────────────────────────────────────────────────────────────────────

name: Gemini AI PR Reviewer

on:
  # Trigger (Manual): When someone comments "/review" on a PR
  issue_comment:
    types: [created]

jobs:
  review:
    runs-on: ubuntu-latest

    # For manual trigger: only run if comment is on a PR, contains "/review", and commenter is authorized
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review') &&
      contains(fromJson('["SB2318", "rushiii3"]'), github.event.comment.user.login)

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Run AI Reviewer Script
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_KEY_1 }},${{ secrets.GEMINI_KEY_2 }},${{ secrets.GEMINI_KEY_3 }},${{ secrets.GEMINI_KEY_4 }},${{ secrets.GEMINI_KEY_5 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Resolve PR number from either trigger source
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: python .github/scripts/ai_reviewer.py
