# ──────────────────────────────────────────────────────────────────────────────
# 🎉 Auto Comment on PR Merge
# ──────────────────────────────────────────────────────────────────────────────
#
# DESCRIPTION:
#   Automatically posts a congratulatory comment on a pull request the moment
#   it is successfully merged. This celebrates the contributor's effort and
#   encourages further participation in the project.
#
# HOW IT WORKS:
#   1. Triggers on every pull_request_target closed event.
#   2. Checks if the PR was actually merged (not just closed/rejected).
#   3. If merged, posts a thank-you comment on the PR using the GitHub API:
#        "Congratulations! Your PR has been successfully merged 🥳🎉
#         Thank you for your contribution 🚀 Keep Contributing!! ✨"
#   4. Exits with an error if the comment fails to post (HTTP != 201).
#
# TRIGGERS:
#   - Automatic : Fires whenever a PR is closed (merged or not).
#                 The job itself only runs when merged == true.
#
# PERMISSIONS REQUIRED:
#   - issues: write         → to post the comment (issues API covers PR comments)
#   - pull-requests: write  → to interact with the PR
#
# SECRETS REQUIRED:
#   - GITHUB_TOKEN  → provided automatically by GitHub, no setup needed
# ──────────────────────────────────────────────────────────────────────────────

name: Auto Comment on PR Merge

on:
  pull_request_target:
    types: [closed]

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
    - name: Add Comment to Merged PR
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        COMMENT=$(cat <<EOF
        {
          "body": "Congratulations, Your pull request has been successfully merged 🥳🎉 Thank you for your contribution to the project 🚀 Keep Contributing!! ✨"
        }
        EOF
        )
        RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "$COMMENT")
        cat response.json
        if [ "$RESPONSE" -ne 201 ]; then
          echo "Failed to add comment"
          exit 1
        fi
