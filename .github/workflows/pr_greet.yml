# ──────────────────────────────────────────────────────────────────────────────
# 👋 PR Greeting Bot
# ──────────────────────────────────────────────────────────────────────────────
#
# DESCRIPTION:
#   Automatically welcomes contributors when they open a new pull request.
#   Posts a friendly thank-you comment on the PR to make contributors feel
#   appreciated and set expectations about the review process.
#
# HOW IT WORKS:
#   1. Triggers immediately when a new PR is opened (pull_request_target opened).
#   2. Posts a welcome comment on the PR that includes:
#        - A thank-you to the contributor by name.
#        - A note that the team will review the PR soon.
#        - A reminder to mark completed checklist items in the PR description.
#        - A thank-you for their patience.
#   3. Uses pull_request_target (instead of pull_request) so the workflow has
#      write permissions even for PRs from forks.
#   4. Exits with an error if the comment fails to post (HTTP != 201).
#
# TRIGGERS:
#   - Automatic : Fires instantly when any new PR is opened.
#
# PERMISSIONS REQUIRED:
#   - issues: write         → to post the comment via the issues comments API
#   - pull-requests: write  → to interact with the PR
#
# SECRETS REQUIRED:
#   - GITHUB_TOKEN  → provided automatically by GitHub, no setup needed
# ──────────────────────────────────────────────────────────────────────────────

name: Auto Comment on PR

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest

    steps:
    - name: Add Comment to Pull Request
      run: |
        COMMENT=$(cat <<EOF
        {
          "body": "Thank you @${commentAuthor}, for creating the PR and contributing to our UltimateHealth project 💗. \n Our team will review the PR and will reach out to you soon! 😇 \n Make sure that you have marked all the tasks that you are done with ✅. \n Thank you for your patience! 😀"
        }
        EOF
        )
        RESPONSE=$(curl -s -o response.json -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
          -d "$COMMENT")
        cat response.json
        if [ "$RESPONSE" -ne 201 ]; then
          echo "Failed to add comment"
          exit 1
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
