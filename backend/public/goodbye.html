<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Goodbye • Your Account Has Been Deleted</title>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #333;
    }

    .card {
      background: white;
      width: 380px;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    p {
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 18px;
      color: #555;
    }

    .smiley {
      font-size: 46px;
      margin-bottom: 14px;
    }

    a {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 16px;
      background: #4c8bf5;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    a:hover {
      background: #3374e9;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="smiley">👋</div>

    <h2>Your Account Has Been Deleted</h2>

    <p>
      We’re sorry to see you go.  
      Thank you for being a part of our journey.  
      If you ever decide to return, we’ll be here to welcome you back.
    </p>

    <a href="/login-user.html">Return to Home</a>
  </div>

</body>
</html>
