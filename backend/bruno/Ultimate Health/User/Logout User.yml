info:
  name: Logout User
  type: http
  seq: 10

http:
  method: POST
  url: "{{baseUrl}}/api/user/logout"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if(body.success){
          bru.deleteEnvVar("refreshToken");
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
